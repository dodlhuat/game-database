services:

  # ----------------------------------------------------------------
  # PostgreSQL
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: game-db-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: game_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------
  # Laravel Backend (PHP-FPM)
  # ----------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: game-db-backend
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - backend_storage_framework:/var/www/backend/storage/framework
      - backend_storage_logs:/var/www/backend/storage/logs
      - backend_bootstrap_cache:/var/www/backend/bootstrap/cache
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------------
  # Nginx (Reverse Proxy für Laravel)
  # ----------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: game-db-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ----------------------------------------------------------------
  # Nuxt.js Frontend (Dev Server mit Hot Reload)
  # ----------------------------------------------------------------
  frontend:
    image: node:22-alpine
    container_name: game-db-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules   # node_modules nicht überschreiben
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000/api
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      # Polling statt native file-watching (nötig für Windows bind-mounts)
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - nginx

volumes:
  postgres_data:
  backend_storage_framework:
  backend_storage_logs:
  backend_bootstrap_cache:
