services:

  # ----------------------------------------------------------------
  # MariaDB
  # ----------------------------------------------------------------
  mariadb:
    image: mariadb:11-jammy
    container_name: game-db-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: game_database
      MARIADB_USER: game_user
      MARIADB_PASSWORD: secret
      MARIADB_ROOT_PASSWORD: rootsecret
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------
  # Laravel Backend (PHP-FPM)
  # ----------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: game-db-backend
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - backend_storage_framework:/var/www/backend/storage/framework
      - backend_storage_logs:/var/www/backend/storage/logs
      - backend_bootstrap_cache:/var/www/backend/bootstrap/cache
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: game_database
      DB_USERNAME: game_user
      DB_PASSWORD: secret
      SESSION_DRIVER: cookie
      SESSION_DOMAIN: localhost
      SANCTUM_STATEFUL_DOMAINS: localhost:3000,127.0.0.1:3000
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_ENCRYPTION: "null"
    depends_on:
      mariadb:
        condition: service_healthy
      mailpit:
        condition: service_started

  # ----------------------------------------------------------------
  # Nginx (Reverse Proxy für Laravel)
  # ----------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: game-db-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # ----------------------------------------------------------------
  # Mailpit (Mail-Catching für lokale Entwicklung)
  # ----------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: game-db-mailpit
    restart: unless-stopped
    ports:
      - "8026:8025"   # Web UI (8025 already used by another project)
      - "1025:1025"   # SMTP


volumes:
  mariadb_data:
  backend_storage_framework:
  backend_storage_logs:
  backend_bootstrap_cache:
