services:

  # ----------------------------------------------------------------
  # PostgreSQL
  # ----------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: game-db-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_DATABASE}
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # Laravel Backend (PHP-FPM, Code im Image gebacken)
  # ----------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: game-db-backend
    restart: unless-stopped
    environment:
      APP_NAME:    "${APP_NAME}"
      APP_ENV:     production
      APP_DEBUG:   "false"
      APP_KEY:     "${APP_KEY}"
      APP_URL:     "https://${DOMAIN}"
      FRONTEND_URL: "https://${DOMAIN}"

      APP_LOCALE:          de
      APP_FALLBACK_LOCALE: de

      DB_CONNECTION: pgsql
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_DATABASE:   "${DB_DATABASE}"
      DB_USERNAME:   "${DB_USERNAME}"
      DB_PASSWORD:   "${DB_PASSWORD}"

      SESSION_DRIVER:   cookie
      SESSION_LIFETIME: 120
      SESSION_DOMAIN:   ".${DOMAIN}"

      SANCTUM_STATEFUL_DOMAINS: "${DOMAIN}"

      QUEUE_CONNECTION: database
      CACHE_STORE:      database
      FILESYSTEM_DISK:  local

      LOG_CHANNEL: stack
      LOG_LEVEL:   error

      MAIL_MAILER:       smtp
      MAIL_HOST:         "${MAIL_HOST}"
      MAIL_PORT:         "${MAIL_PORT}"
      MAIL_USERNAME:     "${MAIL_USERNAME}"
      MAIL_PASSWORD:     "${MAIL_PASSWORD}"
      MAIL_ENCRYPTION:   ssl
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
      MAIL_FROM_NAME:    "${APP_NAME}"

      CLOUDINARY_CLOUD_NAME:    "${CLOUDINARY_CLOUD_NAME}"
      CLOUDINARY_API_KEY:       "${CLOUDINARY_API_KEY}"
      CLOUDINARY_API_SECRET:    "${CLOUDINARY_API_SECRET}"
      CLOUDINARY_UPLOAD_PRESET: "${CLOUDINARY_UPLOAD_PRESET}"
    volumes:
      - backend_storage:/var/www/backend/storage
      - backend_cache:/var/www/backend/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------------
  # Nginx (SSL-Termination + Reverse Proxy + Frontend)
  # ----------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: game-db-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN}"
    volumes:
      - ./docker/nginx/prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./frontend-dist:/var/www/frontend:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend

  # ----------------------------------------------------------------
  # Certbot (SSL-Zertifikate via Let's Encrypt)
  # ----------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: game-db-certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  backend_storage:
  backend_cache:
  letsencrypt:
  certbot_www:
